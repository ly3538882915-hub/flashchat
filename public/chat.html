<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashChat</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="chat-body">
  <div class="app-layout">
    <!-- 左侧会话列表 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="icon-btn menu-btn" id="menu-btn" title="菜单">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </button>
        <div class="search-box">
          <svg viewBox="0 0 24 24" width="20" height="20" class="search-icon"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 5L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
          <input type="text" id="search-input" placeholder="搜索" />
        </div>
      </div>

      <!-- V0.3 新增：侧边栏标签切换（聊天 / 好友） -->
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" data-stab="chats">聊天</button>
        <button class="sidebar-tab" data-stab="friends">好友</button>
        <button class="sidebar-tab" data-stab="music">音乐</button>
        <button class="sidebar-tab" data-stab="mail">邮件</button>
        <button class="sidebar-tab admin-only-tab" data-stab="admin" style="display:none;">用户管理</button>
        <span class="sidebar-tab-badge" id="friend-request-badge" style="display:none;">0</span>
        <span class="sidebar-tab-badge mail-badge" id="mail-badge" style="display:none;">0</span>
      </div>

      <div class="conversation-list" id="conversation-list">
        <!-- 会话项动态生成 -->
      </div>

      <!-- V0.3 新增：好友面板 -->
      <div class="friends-panel" id="friends-panel" style="display:none;">
        <div class="friends-section" id="friend-requests-section" style="display:none;">
          <div class="friends-section-title">好友请求</div>
          <div class="friend-request-list" id="friend-request-list"></div>
        </div>
        <div class="friends-section">
          <div class="friends-section-title">我的好友</div>
          <div class="friend-list" id="friend-list">
            <p class="empty-hint">还没有好友，点击右上角按钮搜索添加</p>
          </div>
        </div>
      </div>

      <!-- V0.4 新增：音乐面板 -->
      <div class="music-panel" id="music-panel" style="display:none;">
        <div class="music-section">
          <div class="music-section-title">
            <span>音乐库</span>
            <button class="music-upload-btn" id="music-upload-btn" style="display:none;">
              <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
              上传
            </button>
          </div>
          <div class="music-list" id="music-list">
            <p class="empty-hint">暂无音乐</p>
          </div>
        </div>
        <!-- V0.6 新增：音乐建议区 -->
        <div class="music-section music-suggestion-section">
          <div class="music-section-title">
            <span>歌曲建议</span>
          </div>
          <div class="music-suggestion-form">
            <input type="text" id="suggestion-song-name" placeholder="歌曲名称" />
            <input type="text" id="suggestion-artist" placeholder="歌手（可选）" />
            <textarea id="suggestion-note" placeholder="想说的话（可选）" rows="2"></textarea>
            <button class="btn-primary btn-sm" id="submit-suggestion-btn">提交建议</button>
          </div>
          <div class="music-suggestion-list" id="music-suggestion-list"></div>
        </div>
      </div>

      <!-- V0.5 新增：管理员用户管理面板 -->
      <div class="admin-panel" id="admin-panel" style="display:none;">
        <div class="admin-stats">
          <div class="admin-stat-card">
            <div class="admin-stat-num" id="admin-total-count">0</div>
            <div class="admin-stat-label">总注册用户</div>
          </div>
          <div class="admin-stat-card">
            <div class="admin-stat-num" id="admin-online-count">0</div>
            <div class="admin-stat-label">当前在线</div>
          </div>
        </div>
        <div class="admin-section">
          <div class="admin-section-title">
            <span>注册用户列表</span>
            <button class="admin-refresh-btn" id="admin-refresh-btn" title="刷新">
              <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            </button>
          </div>
          <div class="admin-user-list" id="admin-user-list">
            <p class="empty-hint">加载中...</p>
          </div>
        </div>
      </div>

      <!-- V0.6 新增：邮件面板 -->
      <div class="mail-panel" id="mail-panel" style="display:none;">
        <div class="mail-section">
          <div class="mail-section-title">
            <span>写邮件</span>
          </div>
          <div class="mail-compose-form">
            <div class="mail-recipient-wrapper">
              <input type="text" id="mail-recipient" placeholder="收件人昵称（输入@选择在线用户）" />
              <div class="mail-recipient-suggestions" id="mail-recipient-suggestions" style="display:none;"></div>
            </div>
            <input type="text" id="mail-subject" placeholder="邮件主题" />
            <textarea id="mail-content" placeholder="邮件内容" rows="4"></textarea>
            <button class="btn-primary btn-sm" id="send-mail-btn">发送邮件</button>
          </div>
        </div>
        <div class="mail-section">
          <div class="mail-section-title">
            <span>收件箱</span>
            <button class="admin-refresh-btn" id="mail-refresh-btn" title="刷新">
              <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            </button>
          </div>
          <div class="mail-list" id="mail-list">
            <p class="empty-hint">暂无邮件</p>
          </div>
        </div>
      </div>

      <!-- 底部当前用户信息 -->
      <div class="sidebar-footer" id="sidebar-footer">
        <div class="avatar" id="my-avatar"></div>
        <div class="my-info">
          <div class="my-nickname" id="my-nickname"></div>
          <div class="my-status">在线</div>
        </div>
        <div class="footer-actions">
          <button class="icon-btn" id="new-chat-btn" title="发起新聊天">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M19 7.001c0 3.864-3.134 7-7 7s-7-3.136-7-7 3.134-7 7-7 7 3.136 7 7zm-2 0c0-2.757-2.243-5-5-5s-5 2.243-5 5 2.243 5 5 5 5-2.243 5-5z"/></svg>
          </button>
          <button class="icon-btn logout-icon-btn" id="logout-icon-btn" title="退出登录">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- 右侧聊天区域 -->
    <main class="chat-main" id="chat-main">
      <!-- V0.65 新增：右上角时钟 -->
      <div class="clock-widget" id="clock-widget">
        <span id="clock-display">--</span>
      </div>
      <!-- 空状态（Telegram 风格气泡图标 + 浮动动画） -->
      <div class="chat-empty" id="chat-empty">
        <div class="empty-icon-float">
          <svg viewBox="0 0 120 120" width="120" height="120" class="empty-bubble-svg">
            <defs>
              <linearGradient id="emptyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#2AABEE;stop-opacity:0.3" />
                <stop offset="100%" style="stop-color:#1d8fc4;stop-opacity:0.15" />
              </linearGradient>
            </defs>
            <path fill="url(#emptyGrad)" d="M60 10C30 10 10 28 10 50c0 12 7 22 18 29v18l16-10c5 1 10 2 16 2 30 0 50-18 50-40S90 10 60 10z"/>
            <path fill="#2AABEE" opacity="0.5" d="M60 22C36 22 22 36 22 50c0 8 4 15 11 20v13l12-7c5 1 9 2 15 2 24 0 38-14 38-28S84 22 60 22z"/>
            <circle cx="45" cy="50" r="4" fill="#2AABEE" opacity="0.6"/>
            <circle cx="60" cy="50" r="4" fill="#2AABEE" opacity="0.6"/>
            <circle cx="75" cy="50" r="4" fill="#2AABEE" opacity="0.6"/>
          </svg>
        </div>
        <h2>选择一个会话开始聊天</h2>
        <p>或点击右下角按钮发起新对话</p>

        <!-- V0.65.2 字体切换面板 -->
        <div class="font-switch-panel" id="font-switch-panel">
          <div class="font-switch-title">字体切换</div>
          <div class="font-switch-options">
            <button class="font-switch-btn font-option active" data-font="default">默认</button>
            <button class="font-switch-btn font-option" data-font="songti">宋体</button>
            <button class="font-switch-btn font-option" data-font="cartoon">卡通</button>
          </div>
        </div>
      </div>

      <!-- 聊天内容 -->
      <div class="chat-content" id="chat-content" style="display:none;">
        <div class="chat-header" id="chat-header">
          <button class="icon-btn back-btn" id="back-btn" title="返回">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          </button>
          <div class="avatar header-avatar" id="header-avatar"></div>
          <div class="header-info">
            <div class="header-name" id="header-name"></div>
            <div class="header-status" id="header-status"></div>
          </div>
          <button class="icon-btn" id="info-btn" title="会话信息">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
          </button>
        </div>

        <div class="messages-area" id="messages-area">
          <div class="load-more-wrapper" id="load-more-wrapper" style="display:none;">
            <button class="load-more-btn" id="load-more-btn">加载更多消息</button>
          </div>
          <div class="messages-list" id="messages-list"></div>
          <div class="typing-indicator" id="typing-indicator" style="display:none;"></div>
        </div>

        <!-- 滚动到底部按钮 -->
        <div class="scroll-bottom-btn" id="scroll-bottom-btn" style="display:none;">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
          <span class="scroll-bottom-badge" id="scroll-bottom-badge" style="display:none;"></span>
        </div>

        <!-- 消息输入区（Telegram 风格） -->
        <div class="message-input-area">
          <!-- 附件按钮（V0.2 占位） -->
          <button class="icon-btn attach-btn" id="attach-btn" title="附件">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
          </button>
          <!-- 输入框容器 -->
          <div class="input-box-wrapper">
            <textarea id="message-input" placeholder="输入消息..." rows="1"></textarea>
            <!-- Emoji 按钮 -->
            <button class="icon-btn emoji-btn" id="emoji-btn" title="表情">
              <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
            </button>
          </div>
          <!-- 发送/麦克风按钮 -->
          <button class="send-btn" id="send-btn" title="发送">
            <span class="send-btn-icon send-icon">
              <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </span>
            <span class="send-btn-icon mic-icon">
              <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
            </span>
          </button>
        </div>

        <!-- Emoji 快捷面板 -->
        <div class="emoji-panel" id="emoji-panel" style="display:none;">
          <div class="emoji-panel-header">
            <span>常用表情</span>
          </div>
          <div class="emoji-grid" id="emoji-grid">
            <!-- emoji 动态生成 -->
          </div>
        </div>
      </div>
    </main>

    <!-- 新建聊天弹窗 -->
    <div class="modal-overlay" id="new-chat-modal" style="display:none;">
      <div class="modal">
        <div class="modal-header">
          <h3>发起新聊天</h3>
          <button class="icon-btn" id="close-modal-btn">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
        <div class="modal-tabs-wrapper">
          <div class="modal-tabs">
            <button class="modal-tab active" data-mtab="search">添加好友</button>
            <button class="modal-tab" data-mtab="group">创建群聊</button>
          </div>
          <div class="modal-tab-indicator" id="modal-tab-indicator"></div>
        </div>

        <!-- 搜索用户 -->
        <div class="modal-pane active" id="pane-search">
          <div class="search-box modal-search">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 5L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
            <input type="text" id="user-search-input" placeholder="搜索用户名或昵称" />
          </div>
          <div class="user-search-results" id="user-search-results">
            <p class="modal-hint">输入关键词搜索用户</p>
          </div>
        </div>

        <!-- 创建群聊 -->
        <div class="modal-pane" id="pane-group">
          <div class="form-group">
            <label for="group-name-input">群组名称</label>
            <input type="text" id="group-name-input" placeholder="给群聊起个名字" />
          </div>
          <div class="search-box modal-search">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 5L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
            <input type="text" id="group-member-search" placeholder="搜索用户添加到群聊" />
          </div>
          <div class="user-search-results" id="group-search-results">
            <p class="modal-hint">搜索并选择成员</p>
          </div>
          <div class="selected-members" id="selected-members"></div>
          <button class="btn-primary" id="create-group-btn" disabled>创建群聊</button>
        </div>
      </div>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal-overlay" id="settings-modal" style="display:none;">
      <div class="modal">
        <div class="modal-header">
          <h3>设置</h3>
          <button class="icon-btn" id="close-settings-btn">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
        <div class="modal-pane active">
          <!-- V0.6 新增：头像上传 -->
          <div class="form-group">
            <label>头像</label>
            <div class="avatar-upload-area" id="avatar-upload-area">
              <div class="avatar-upload-preview" id="avatar-upload-preview"></div>
              <div class="avatar-upload-hint">点击更换头像</div>
              <input type="file" id="avatar-file-input" accept="image/*" style="display:none;" />
            </div>
          </div>
          <div class="form-group">
            <label for="settings-nickname">修改昵称</label>
            <input type="text" id="settings-nickname" placeholder="输入新昵称" />
          </div>
          <button class="btn-primary" id="save-profile-btn">保存</button>
          <hr class="divider" />
          <button class="btn-danger" id="logout-btn">退出登录</button>
        </div>
      </div>
    </div>

    <!-- V0.4 新增：音乐上传弹窗 -->
    <div class="modal-overlay" id="music-upload-modal" style="display:none;">
      <div class="modal">
        <div class="modal-header">
          <h3>上传音乐</h3>
          <button class="icon-btn" id="close-music-upload-btn">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
        <div class="modal-pane active">
          <div class="form-group">
            <label for="music-title-input">歌曲名称（可选）</label>
            <input type="text" id="music-title-input" placeholder="留空则使用文件名" />
          </div>
          <div class="form-group">
            <label>选择音频文件</label>
            <div class="file-upload-area" id="file-upload-area">
              <input type="file" id="music-file-input" accept="audio/*,.mp3,.wav,.ogg,.m4a,.flac,.aac" style="display:none;" />
              <div class="file-upload-hint" id="file-upload-hint">
                <svg viewBox="0 0 24 24" width="36" height="36"><path fill="currentColor" d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                <p class="file-upload-main">点击选择音频文件</p>
                <p class="file-upload-sub">支持 MP3, WAV, OGG, M4A, FLAC（最大 300MB）</p>
              </div>
            </div>
          </div>
          <button class="btn-primary" id="upload-music-btn" disabled>上传</button>
        </div>
      </div>
    </div>

    <!-- V0.6 新增：邮件查看弹窗 -->
    <div class="modal-overlay" id="mail-view-modal" style="display:none;">
      <div class="modal">
        <div class="modal-header">
          <h3 id="mail-view-subject">邮件</h3>
          <button class="icon-btn" id="close-mail-view-btn">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
        <div class="modal-pane active">
          <div class="mail-view-meta">
            <div>发件人: <span id="mail-view-sender"></span></div>
            <div>时间: <span id="mail-view-time"></span></div>
          </div>
          <hr class="divider" />
          <div class="mail-view-content" id="mail-view-content"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- V0.4 新增：底部音乐播放器 -->
  <div class="music-player" id="music-player" style="display:none;">
    <div class="player-info">
      <div class="player-icon">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      </div>
      <div class="player-text">
        <div class="player-title" id="player-title">未播放</div>
        <div class="player-time"><span id="player-current">0:00</span> / <span id="player-duration">0:00</span></div>
      </div>
    </div>
    <div class="player-progress" id="player-progress">
      <div class="player-progress-bar" id="player-progress-bar"></div>
    </div>
    <div class="player-controls">
      <button class="player-btn" id="player-play-btn" title="播放">
        <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="player-btn" id="player-pause-btn" style="display:none;" title="暂停">
        <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
    </div>
  </div>
  <audio id="audio-player" preload="metadata"></audio>

  <!-- V0.65 新增：封禁提示覆盖层 -->
  <div class="banned-overlay" id="banned-overlay" style="display:none;">
    <div class="banned-card">
      <div class="banned-icon">
        <svg viewBox="0 0 24 24" width="64" height="64"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8 0-1.85.63-3.55 1.69-4.9L16.9 18.31C15.55 19.37 13.85 20 12 20zm6.31-3.1L7.1 5.69C8.45 4.63 10.15 4 12 4c4.41 0 8 3.59 8 8 0 1.85-.63 3.55-1.69 4.9z"/></svg>
      </div>
      <h2 class="banned-title">账号已被封禁</h2>
      <p class="banned-reason-label">封禁原因：</p>
      <p class="banned-reason-text" id="banned-reason-text"></p>
      <p class="banned-hint">如有疑问请联系管理员解封</p>
    </div>
  </div>

  <!-- Toast 通知容器 -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/chat.js"></script>
</body>
</html>
