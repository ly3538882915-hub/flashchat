<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram FlashChat - 登录</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-body">
  <!-- 背景动画粒子层 -->
  <div class="auth-particles" aria-hidden="true">
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
  </div>

  <div class="auth-container">
    <div class="auth-card auth-card-enter">
      <!-- Logo 带呼吸动画 -->
      <div class="auth-logo">
        <div class="logo-circle telegram-logo">
          <svg viewBox="0 0 240 240" width="72" height="72">
            <path fill="#ffffff" d="M66.964 134.875s-21.732-7.602-35.21-12.95c-13.477-5.349-5.35-10.024-5.35-10.024s51.287-19.893 95.915-37.183c44.628-17.29 64.732-23.397 64.732-23.397s13.5-4.872 12.45 6.75c-.525 5.835-1.838 16.013-3.375 27.788-2.463 18.863-5.625 41.175-7.2 52.575-1.575 11.4-6.862 16.575-15.75 12.15-8.887-4.425-28.35-16.575-28.35-16.575l-16.575-15.75s-5.35-4.725-1.575-9.45c3.775-4.725 8.662-9.45 8.662-9.45s2.1-2.625-1.575-3.675c-3.675-1.05-27.562-9.975-27.562-9.975s-4.2-1.575-7.087 2.1c-2.888 3.675-22.05 21.525-22.05 21.525s-3.15 2.625-7.35 2.1z"/>
          </svg>
        </div>
        <h1>Telegram FlashChat</h1>
        <p class="auth-subtitle">极速、简洁的网页聊天</p>
      </div>

      <!-- 标签切换（带滑动指示器） -->
      <div class="auth-tabs-wrapper">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">登录</button>
          <button class="auth-tab" data-tab="register">注册</button>
        </div>
        <div class="auth-tab-indicator" id="tab-indicator"></div>
      </div>

      <!-- 登录表单 -->
      <form id="login-form" class="auth-form active">
        <div class="form-group">
          <label for="login-username">用户名</label>
          <div class="input-wrapper">
            <input type="text" id="login-username" placeholder="请输入用户名" autocomplete="username" required />
            <span class="input-underline"></span>
          </div>
        </div>
        <div class="form-group">
          <label for="login-password">密码</label>
          <div class="input-wrapper">
            <input type="password" id="login-password" placeholder="请输入密码" autocomplete="current-password" required />
            <span class="input-underline"></span>
          </div>
        </div>
        <div class="form-error" id="login-error"></div>
        <button type="submit" class="btn-primary auth-submit">
          <span class="btn-text">登录</span>
          <span class="btn-wave"></span>
        </button>
      </form>

      <!-- 注册表单 -->
      <form id="register-form" class="auth-form">
        <div class="form-group">
          <label for="reg-username">用户名</label>
          <div class="input-wrapper">
            <input type="text" id="reg-username" placeholder="3-20位字母数字下划线" autocomplete="username" required />
            <span class="input-underline"></span>
          </div>
        </div>
        <div class="form-group">
          <label for="reg-nickname">昵称</label>
          <div class="input-wrapper">
            <input type="text" id="reg-nickname" placeholder="显示给别人的名称" required />
            <span class="input-underline"></span>
          </div>
        </div>
        <div class="form-group">
          <label for="reg-password">密码</label>
          <div class="input-wrapper">
            <input type="password" id="reg-password" placeholder="至少6位" autocomplete="new-password" required />
            <span class="input-underline"></span>
          </div>
        </div>
        <div class="form-error" id="register-error"></div>
        <button type="submit" class="btn-primary auth-submit">
          <span class="btn-text">注册</span>
          <span class="btn-wave"></span>
        </button>
      </form>
    </div>
  </div>

  <!-- V0.65 新增：封禁提示覆盖层 -->
  <div class="banned-overlay" id="banned-overlay" style="display:none;">
    <div class="banned-card">
      <div class="banned-icon">
        <svg viewBox="0 0 24 24" width="64" height="64"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8 0-1.85.63-3.55 1.69-4.9L16.9 18.31C15.55 19.37 13.85 20 12 20zm6.31-3.1L7.1 5.69C8.45 4.63 10.15 4 12 4c4.41 0 8 3.59 8 8 0 1.85-.63 3.55-1.69 4.9z"/></svg>
      </div>
      <h2 class="banned-title">账号已被封禁</h2>
      <p class="banned-reason-label">封禁原因：</p>
      <p class="banned-reason-text" id="banned-reason-text"></p>
      <p class="banned-hint">如有疑问请联系管理员解封</p>
      <p class="banned-countdown" id="banned-countdown">5秒后返回登录界面...</p>
    </div>
  </div>

  <!-- V0.6 新增：注册后软件公告弹窗 -->
  <div class="modal-overlay" id="announcement-modal" style="display:none;">
    <div class="modal announcement-modal">
      <div class="modal-header">
        <h3 id="announcement-title">软件公告</h3>
      </div>
      <div class="announcement-content" id="announcement-content">
        <pre id="announcement-text"></pre>
      </div>
      <div class="announcement-footer">
        <div class="announcement-scroll-hint" id="announcement-scroll-hint">请向下滑动阅读完公告后继续</div>
        <button class="btn-primary" id="announcement-confirm-btn" disabled>开始使用</button>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
