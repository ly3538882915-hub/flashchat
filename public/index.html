<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashChat - 登录</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-body">
  <!-- 背景动画粒子层 -->
  <div class="auth-particles" aria-hidden="true">
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
  </div>

  <div class="auth-container">
    <div class="auth-card auth-card-enter">
      <!-- Logo 带呼吸动画 -->
      <div class="auth-logo">
        <div class="logo-circle">
          <span class="logo-letter">F</span>
        </div>
        <h1>FlashChat</h1>
        <p class="auth-subtitle">极速、简洁的网页聊天</p>
      </div>

      <!-- 标签切换（带滑动指示器） -->
      <div class="auth-tabs-wrapper">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">登录</button>
          <button class="auth-tab" data-tab="register">注册</button>
        </div>
        <div class="auth-tab-indicator" id="tab-indicator"></div>
      </div>

      <!-- 登录表单 -->
      <form id="login-form" class="auth-form active">
        <div class="form-group">
          <label for="login-username">用户名</label>
          <div class="input-wrapper">
            <input type="text" id="login-username" placeholder="请输入用户名" autocomplete="username" required />
            <span class="input-underline"></span>
          </div>
        </div>
        <div class="form-group">
          <label for="login-password">密码</label>
          <div class="input-wrapper">
            <input type="password" id="login-password" placeholder="请输入密码" autocomplete="current-password" required />
            <span class="input-underline"></span>
          </div>
        </div>
        <div class="form-error" id="login-error"></div>
        <button type="submit" class="btn-primary auth-submit">
          <span class="btn-text">登录</span>
          <span class="btn-wave"></span>
        </button>
      </form>

      <!-- 注册表单 -->
      <form id="register-form" class="auth-form">
        <div class="form-group">
          <label for="reg-username">用户名</label>
          <div class="input-wrapper">
            <input type="text" id="reg-username" placeholder="3-20位字母数字下划线" autocomplete="username" required />
            <span class="input-underline"></span>
          </div>
        </div>
        <div class="form-group">
          <label for="reg-nickname">昵称</label>
          <div class="input-wrapper">
            <input type="text" id="reg-nickname" placeholder="显示给别人的名称" required />
            <span class="input-underline"></span>
          </div>
        </div>
        <div class="form-group">
          <label for="reg-password">密码</label>
          <div class="input-wrapper">
            <input type="password" id="reg-password" placeholder="至少6位" autocomplete="new-password" required />
            <span class="input-underline"></span>
          </div>
        </div>
        <div class="form-error" id="register-error"></div>
        <button type="submit" class="btn-primary auth-submit">
          <span class="btn-text">注册</span>
          <span class="btn-wave"></span>
        </button>
      </form>
    </div>
  </div>

  <!-- V0.6 新增：注册后软件公告弹窗 -->
  <div class="modal-overlay" id="announcement-modal" style="display:none;">
    <div class="modal announcement-modal">
      <div class="modal-header">
        <h3 id="announcement-title">软件公告</h3>
      </div>
      <div class="announcement-content" id="announcement-content">
        <pre id="announcement-text"></pre>
      </div>
      <div class="announcement-footer">
        <div class="announcement-scroll-hint" id="announcement-scroll-hint">请向下滑动阅读完公告后继续</div>
        <button class="btn-primary" id="announcement-confirm-btn" disabled>开始使用</button>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
